# DISAMBIGUATION — handle commonly confused skills
disambiguation:
  - confused:
      - diagnose
      - tdd
    rule: |
      diagnose = Something is BROKEN — find root cause before fixing
      tdd = You're BUILDING something new — write tests first

  - confused:
      - grill
      - tdd
    rule: |
      grill = Challenge a PLAN before any code is written
      tdd = Execute the plan using test-first development

  - confused:
      - grill
      - persona-brainstorm
    rule: |
      grill              = SOLO. Single agent challenges a known plan against the codebase.
      persona-brainstorm = MULTI-PERSONA. Ezekiel/Jeremiah dialogue to DISCOVER improvements
                           from real friction. No plan yet — discovery first.

  - confused:
      - check-pr
      - greploop
    rule: |
      check-pr = ONE pass. Read the PR, categorize issues, report, optionally fix once.
      greploop = LOOP. Iterate the PR until 5/5 + zero unresolved (max 5 iterations).

  - confused:
      - prototype
      - grill
    rule: |
      prototype = Build throwaway code to ANSWER a design question empirically.
      grill     = Stress-test an already-formed plan against the codebase, by questioning.

  - confused:
      - improve-architecture
      - grill
    rule: |
      improve-architecture = FIND deepening opportunities (shallow → deep modules), then grill one.
      grill                = Stress-test a plan you ALREADY have.

  - confused:
      - grill
      - ui-grill
    rule: |
      grill    = stress-test a general PLAN/approach against the codebase (any domain).
      ui-grill = stress-test UI DESIGN decisions — colors, spacing, motion — in exact values.

  - confused:
      - ui-grill
      - ui-craft
    rule: |
      ui-grill = DECIDE/lock an undecided design (ask the human, force the math).
      ui-craft = PROMPT a model to BUILD UI from an already-locked design.

  - confused:
      - ui-physics
      - ui-craft
    rule: |
      ui-physics = the specificity STANDARD (exact hex/ms/px vocabulary) — the prerequisite.
      ui-craft   = the prompting WORKFLOW that applies that standard to generate UI.

  - confused:
      - tdd
      - webapp-testing
    rule: |
      tdd            = write tests FIRST for code you are building (unit/integration).
      webapp-testing = drive a RUNNING app in a real browser (Playwright) to verify UI behavior.

# ALWAYS-LOADED — stack-INDEPENDENT globals, injected for every task on any codebase.
# Framework pattern files are NOT here anymore (see stack_loaded) — they were dead
# weight on projects that don't use them.
always_loaded:
  # The default behavior on any code task (assume/simplify/surgical/verify).
  # Loaded FIRST so it frames the routed skill as the CONSTANT beneath it.
  - "skills/karpathy-guidelines.md"
  - "skills/context-amortization.md"
  - "skills/honcho-precompaction-checkpoint.md"

# STACK-LOADED — framework pattern files injected ONLY when stack_detect.detect_stack()
# finds the tag in the TARGET project (package.json deps + config files). A SvelteKit
# project pulls svelte.md + the firestore/netlify diagnose patterns; a pure-Python repo
# (like Techne itself) pulls none of them. This is what makes diagnose framework-aware
# without bloating every other codebase.
stack_loaded:
  nextjs:     "skills/nextjs.md"
  react:      "skills/react.md"
  svelte:     "skills/svelte.md"
  sveltekit:  "skills/svelte.md"
  typescript: "skills/typescript.md"
  firestore:  "skills/diagnose/firestore.md"
  netlify:    "skills/diagnose/netlify.md"
