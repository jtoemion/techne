# Skill Router — single source of truth for task→skill routing
# Adopted from jtoemion/harness-engineering-skills
# Agent reads THIS FILE to decide which skill to load.
# First match on condition wins. Higher weight = higher priority on ties.

version: "1.0"
updated: "2026-06-02"

# ROUTING TABLE — evaluated top-to-bottom, first match wins
routing:
  - id: "techne/orchestrator"
    condition: "implement feature, build feature, add feature, coding task, multi-step, plan, orchestrator, full pipeline, end-to-end, atomic tasks, tdd pipeline"
    skill_path: "skills/orchestrator.md"
    weight: 95
    note: "PRIMARY for non-trivial coding tasks. Routes through multi-agent pipeline."

  - id: "techne/diagnose"
    condition: "bug, broken, throwing, failing, regression, not working, debug, diagnose"
    skill_path: "skills/diagnose.md"
    weight: 90
    note: "Always diagnose before attempting a fix. Removed 'error' — too generic, collides with TypeScript routing."

  - id: "techne/writing-skill"
    condition: "write a skill, create a skill, new skill, skill template, audit skill, refactor skill"
    skill_path: "skills/writing-skill.md"
    weight: 88
    note: "High weight — someone asking to write a skill should land here before tdd/grill."

  - id: "techne/tdd"
    condition: "test-first, TDD, red-green-refactor, write tests, test-driven"
    skill_path: "skills/tdd.md"
    weight: 85

  - id: "techne/persona-brainstorm"
    condition: "persona brainstorm, grill session, client dev dialogue, discover improvement, Ezekiel, Jeremiah, brainstorm session"
    skill_path: "skills/persona-brainstorm.md"
    weight: 85
    note: "Multi-persona discovery loop. Outputs ADRs from real friction."

  - id: "techne/grill"
    condition: "stress-test plan, challenge design, grill, review approach, before implementing"
    skill_path: "skills/grill.md"
    weight: 80

  - id: "techne/improve-architecture"
    condition: "improve architecture, refactoring opportunities, deepen module, more testable, consolidate coupling, architecture review"
    skill_path: "skills/improve-architecture.md"
    weight: 78
    note: "Find deepening opportunities — shallow modules into deep ones. Adopted from mattpocock."

  - id: "techne/prototype"
    condition: "prototype, throwaway, mock up, try designs, sanity-check state model, play with it"
    skill_path: "skills/prototype.md"
    weight: 75
    note: "Throwaway code that answers ONE design question. Adopted from mattpocock."

  - id: "techne/check-pr"
    condition: "check pull request, review comments, address review feedback, prepare to merge, pull request status"
    skill_path: "skills/check-pr.md"
    weight: 74
    note: "One-pass PR triage. On a tie with greploop, prefer this (lighter action). Adopted from greptile (MIT)."

  - id: "techne/greploop"
    condition: "greploop, optimize pull request, iterate pull request, greptile review, perfect review score"
    skill_path: "skills/greploop.md"
    weight: 72
    note: "Iterate a PR until 5/5 + zero unresolved. Narrow PR-focused /goal. Adopted from greptile (MIT)."

  - id: "techne/nextjs-rules"
    condition: "Next.js, nextjs, app router, page component, middleware, server component, redirect, layout, metadata"
    skill_path: "skills/nextjs.md"
    weight: 50
    note: "Always loaded as context, but explicit match for Next.js-specific tasks"

  - id: "techne/typescript-rules"
    condition: "TypeScript, type error, type safety, generics, strict mode"
    skill_path: "skills/typescript.md"
    weight: 50

  - id: "techne/telegram-rulebook"
    condition: "telegram behavior, megumi rule, thread routing, telegram session"
    skill_path: "telegram/telegram-rulebook/SKILL.md"
    weight: 95
    note: "Always loaded in Telegram sessions. Thread-to-project routing + tone rules."

  - id: "techne/ezra-assistant"
    condition: "Ezra schedule, Ezra attendance, Ezra student package, BnB LMS tutoring, Ezra reminder"
    skill_path: "productivity/ezra-assistant/SKILL.md"
    weight: 82
    note: "Ezra Theodores' tutoring schedule + attendance workflow. Overlaps with tutor-assistant but Ezra-specific."

  - id: "techne/retro-learn"
    condition: "retro-learn, reinforcement learning, learn from mistakes, mistake patterns, update discipline, weighted patterns"
    skill_path: "skills/retro-learn.md"
    weight: 70
    note: "Post-pipeline reinforcement learning. Analyzes task_db for patterns."

  - id: "techne/implementer"
    condition: "implement, add feature, build, create component, fix, refactor, change"
    skill_path: "skills/implementer.md"
    weight: 30
    note: "General implementation — loaded when no more specific skill matches"

# DISAMBIGUATION — handle commonly confused skills
disambiguation:
  - confused:
      - techne/diagnose
      - techne/tdd
    rule: |
      diagnose = Something is BROKEN — find root cause before fixing
      tdd = You're BUILDING something new — write tests first

  - confused:
      - techne/grill
      - techne/tdd
    rule: |
      grill = Challenge a PLAN before any code is written
      tdd = Execute the plan using test-first development

  - confused:
      - techne/grill
      - techne/persona-brainstorm
    rule: |
      grill              = SOLO. Single agent challenges a known plan against the codebase.
      persona-brainstorm = MULTI-PERSONA. Ezekiel/Jeremiah dialogue to DISCOVER improvements
                           from real friction. No plan yet — discovery first.

  - confused:
      - techne/check-pr
      - techne/greploop
    rule: |
      check-pr = ONE pass. Read the PR, categorize issues, report, optionally fix once.
      greploop = LOOP. Iterate the PR until 5/5 + zero unresolved (max 5 iterations).

  - confused:
      - techne/ezra-assistant
      - techne/tutor-assistant
    rule: |
      ezra-assistant    = Ezra THEODORES specifically. Use admin UID 5VjkeLYp6HNUnc2HR4J7g0qkg3q1.
                          Has Ezra's fixed routine, HTML report format, and 8-session package rules.
      tutor-assistant   = Generic tutor. Not Ezra. Use when no specific tutor name is given.

  - confused:
      - techne/prototype
      - techne/grill
    rule: |
      prototype = Build throwaway code to ANSWER a design question empirically.
      grill     = Stress-test an already-formed plan against the codebase, by questioning.

  - confused:
      - techne/improve-architecture
      - techne/grill
    rule: |
      improve-architecture = FIND deepening opportunities (shallow → deep modules), then grill one.
      grill                = Stress-test a plan you ALREADY have.

# ALWAYS-LOADED — these skills are injected as context for every task
always_loaded:
  - "skills/nextjs.md"
  - "skills/typescript.md"

# COMMON-LOADED — fallback context when no specific skill matches.
# Replaces the old behavior of dumping every .md in skills/.
# Keep this minimal: each file costs context window.
common_loaded:
  - "skills/implementer.md"
  - "skills/typescript.md"
